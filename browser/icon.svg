<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd3ec"/>
      <stop offset="1" stop-color="#ff8ac4"/>
    </linearGradient>
    <linearGradient id="bow" x1="150" y1="120" x2="250" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff5fa2"/>
      <stop offset="1" stop-color="#ff3d8b"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb3d4"/>
      <stop offset="1" stop-color="#ffb3d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded-square app background -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- cat head -->
  <g>
    <!-- ears -->
    <path d="M150 196 L150 92 L244 168 Z" fill="#ffffff" stroke="#3a2230" stroke-width="10" stroke-linejoin="round"/>
    <path d="M362 196 L362 92 L268 168 Z" fill="#ffffff" stroke="#3a2230" stroke-width="10" stroke-linejoin="round"/>
    <!-- head -->
    <ellipse cx="256" cy="280" rx="158" ry="138" fill="#ffffff" stroke="#3a2230" stroke-width="10"/>

    <!-- cheeks -->
    <circle cx="158" cy="300" r="42" fill="url(#cheek)"/>
    <circle cx="354" cy="300" r="42" fill="url(#cheek)"/>

    <!-- eyes -->
    <ellipse cx="200" cy="278" rx="17" ry="24" fill="#3a2230"/>
    <ellipse cx="312" cy="278" rx="17" ry="24" fill="#3a2230"/>
    <circle cx="206" cy="270" r="5.5" fill="#ffffff"/>
    <circle cx="318" cy="270" r="5.5" fill="#ffffff"/>

    <!-- nose -->
    <path d="M256 300 q14 0 0 16 q-14 -16 0 -16 Z" fill="#ffb000"/>
    <ellipse cx="256" cy="304" rx="11" ry="8" fill="#ffcf3f"/>

    <!-- whiskers -->
    <g stroke="#3a2230" stroke-width="8" stroke-linecap="round">
      <path d="M126 280 L74 266"/>
      <path d="M126 300 L72 304"/>
      <path d="M126 320 L76 340"/>
      <path d="M386 280 L438 266"/>
      <path d="M386 300 L440 304"/>
      <path d="M386 320 L436 340"/>
    </g>

    <!-- bow on the cat's right ear -->
    <g transform="translate(330 150)">
      <path d="M0 0 C-46 -34 -86 -30 -86 6 C-86 42 -46 44 0 12 Z" fill="url(#bow)" stroke="#c61f63" stroke-width="8" stroke-linejoin="round"/>
      <path d="M0 0 C46 -34 86 -30 86 6 C86 42 46 44 0 12 Z" fill="url(#bow)" stroke="#c61f63" stroke-width="8" stroke-linejoin="round"/>
      <circle cx="0" cy="6" r="17" fill="#ff7ab0" stroke="#c61f63" stroke-width="8"/>
    </g>
  </g>
</svg>
