name: Release

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write

# The in-app updater reads the git hash from the `version.txt` asset of the latest release and
# downloads the `desktop.asar` asset. The `.sha256` assets let the updater and the installer
# verify their downloads.
env:
    NullCord_REMOTE: ${{ github.repository }}
    # Run the JS actions on Node 24 (silences the Node 20 deprecation warning)
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
    build:
        name: Build NullCord
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install pnpm
              run: corepack enable

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # --standalone makes the in-app updater use the HTTP updater (downloads the new
            # desktop.asar from GitHub Releases) instead of the git updater, which is what an
            # installer/asar distribution needs.
            - name: Build desktop (creates dist/desktop.asar + dist/equibop.asar)
              run: pnpm buildStandalone

            - name: Build web (extensions + userscript)
              run: pnpm buildWeb

            - name: Collect release assets
              run: |
                  mkdir -p out
                  # version marker the in-app updater reads from the CDN (avoids the GitHub API rate limit)
                  echo "${{ github.sha }}" > out/version.txt
                  cp dist/desktop.asar out/
                  cp dist/equibop.asar out/
                  # checksums the in-app updater and the installer verify before applying a download
                  sha256sum out/desktop.asar | cut -d' ' -f1 > out/desktop.asar.sha256
                  sha256sum out/equibop.asar | cut -d' ' -f1 > out/equibop.asar.sha256
                  cp dist/extension-chrome.zip out/
                  cp dist/extension-firefox.zip out/
                  cp dist/NullCord.user.js out/
                  cp dist/NullCord.user.css out/

            - uses: actions/upload-artifact@v4
              with:
                  name: build
                  path: out/

    installer:
        name: Build Windows installer (.exe)
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Parse-check installer script
              shell: powershell
              run: |
                  $path = (Resolve-Path installer/NullCord-Installer-GUI.ps1).Path
                  $bytes = [System.IO.File]::ReadAllBytes($path)
                  if ($bytes.Length -lt 3 -or $bytes[0] -ne 0xEF -or $bytes[1] -ne 0xBB -or $bytes[2] -ne 0xBF) {
                      Write-Host "::error::installer script must be saved as UTF-8 with BOM"
                      exit 1
                  }
                  $tokens = $null
                  $errors = $null
                  [void][System.Management.Automation.Language.Parser]::ParseFile($path, [ref]$tokens, [ref]$errors)
                  if ($errors -and $errors.Count -gt 0) {
                      foreach ($e in $errors) { Write-Host "::error::line $($e.Extent.StartLineNumber): $($e.Message)" }
                      exit 1
                  }
                  Write-Host "Installer script OK"

            - name: Compile GUI installer with ps2exe
              shell: powershell
              run: |
                  Install-Module -Name ps2exe -Force -Scope CurrentUser
                  Invoke-ps2exe `
                      -inputFile installer/NullCord-Installer-GUI.ps1 `
                      -outputFile NullCord-Installer.exe `
                      -noConsole `
                      -iconFile installer/NullCord.ico `
                      -title "NullCord Installer" `
                      -product "NullCord" `
                      -company "NullCord" `
                      -description "Installs NullCord into your Discord desktop client"

            # checksum so users can verify the .exe they download matches this exact build
            - name: Checksum the installer
              shell: powershell
              run: |
                  (Get-FileHash NullCord-Installer.exe -Algorithm SHA256).Hash.ToLower() | Out-File NullCord-Installer.exe.sha256 -Encoding ascii -NoNewline

            - uses: actions/upload-artifact@v4
              with:
                  name: installer
                  path: |
                      NullCord-Installer.exe
                      NullCord-Installer.exe.sha256

    release:
        name: Publish release
        runs-on: ubuntu-latest
        needs: [build, installer]
        steps:
            - name: Download all build outputs
              uses: actions/download-artifact@v4
              with:
                  path: assets
                  merge-multiple: true

            - name: Publish/refresh the rolling release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: latest
                  name: NullCord ${{ github.sha }}
                  make_latest: true
                  body: |
                      Automated NullCord build for commit ${{ github.sha }}.

                      **Install (Windows):** download `NullCord-Installer.exe` below, run it, then start Discord.

                      **Verify your download:** every file ships with a matching `.sha256` checksum. Compare it against your download to confirm it's the genuine, untampered build — see [SECURITY.md](https://github.com/${{ github.repository }}/blob/main/SECURITY.md) for step-by-step instructions.
                  files: assets/**/*

